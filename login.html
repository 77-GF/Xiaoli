<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 小米商城</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div class="container">
    <div class="top-left">
      <a href="index.html">小米商城</a><span>|</span>
      <a href="javascript:;">MIUI</a>
    </div>
    <div class="top-right">
      <a href="login.html" style="color:#fff">登录</a><span style="color:#424242">|</span>
      <a href="login.html">注册</a>
      <a href="cart.html" class="cart-link">&#128722; 购物车<span class="cart-count" id="cartCount">0</span></a>
    </div>
  </div>
</div>

<header class="header">
  <div class="container">
    <div class="logo"><a href="index.html">MI</a></div>
    <div style="margin-left:auto;font-size:16px;color:#333">欢迎登录小米商城</div>
  </div>
</header>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo"><a href="index.html">小米账号</a></div>

    <div class="login-tabs">
      <a href="javascript:;" class="active">账号登录</a>
      <a href="javascript:;">手机号注册</a>
    </div>

    <!-- 登录表单 -->
    <div class="login-tab-content active">
      <div class="form-group">
        <input type="text" placeholder="小米账号 / 手机号 / 邮箱">
      </div>
      <div class="form-group">
        <input type="password" placeholder="密码">
      </div>
      <div class="form-extra">
        <label><input type="checkbox"> 记住密码</label>
        <a href="javascript:;">忘记密码？</a>
      </div>
      <button class="btn-submit" onclick="doLogin()">登 录</button>
      <div class="form-sms">
        其他登录方式：<a href="javascript:;">短信验证码登录</a>
      </div>
    </div>

    <!-- 注册表单 -->
    <div class="login-tab-content">
      <div class="form-group">
        <input type="text" placeholder="请输入手机号">
      </div>
      <div class="form-group" style="display:flex;gap:8px">
        <input type="text" placeholder="短信验证码" style="flex:1">
        <button style="width:110px;height:46px;background:#fff;color:#ff6700;border:1px solid #ff6700;border-radius:4px;font-size:13px;white-space:nowrap;flex-shrink:0">获取验证码</button>
      </div>
      <div class="form-group">
        <input type="password" placeholder="设置密码（8-16位）">
      </div>
      <div class="form-group">
        <input type="password" placeholder="确认密码">
      </div>
      <div class="form-extra">
        <label><input type="checkbox"> 已阅读并同意 <a href="javascript:;">用户协议</a> 和 <a href="javascript:;">隐私政策</a></label>
      </div>
      <button class="btn-submit" onclick="doRegister()">注 册</button>
    </div>
  </div>
</div>

<script>
function doLogin() {
  App.showToast('登录成功！欢迎回来');
  setTimeout(function() { location.href = 'index.html'; }, 800);
}
function doRegister() {
  App.showToast('注册成功！即将跳转');
  setTimeout(function() { location.href = 'index.html'; }, 800);
}
</script>
<script src="js/main.js"></script>
</body>
</html>
